# ============================================================
# devdocs-forge-agent — Project Configuration
# ============================================================
# Copy this file to config/devdocs-forge-agent.yml
# Customize for your project. This file is safe to commit.
# Do NOT put API keys here — use .env instead.
# ============================================================

project:
  name: "My Docs Project"
  default_output_type: "docusaurus"
  output_dir: "output"
  input_dir: "input"

model:
  provider: "mock"
  temperature: 0.3
  max_tokens: 6000

writing:
  audience: "intermediate developers"
  tone: "clear, practical, friendly"
  style: "developer documentation"
  include_summary: true
  include_faq: true
  include_troubleshooting: true
  include_code_explanations: true
  include_review_checklist: true

docusaurus:
  sidebar_position: 1
  tags:
    - tutorial
    - documentation

safety:
  require_permission_notice: true
  require_human_review: true
  avoid_plagiarism: true
  include_source_attribution: true

video_intake:
  enabled: true
  # devdocs-forge-agent never scrapes transcripts — you must always provide --file
  allow_url_only_generation: false
  require_transcript: true
  allow_force_for_low_confidence: true
  min_tech_confidence_score: 60
  min_transcript_words: 150
  allowed_domains:
    - youtube.com
    - youtu.be
    - vimeo.com
  preferred_categories:
    - Education
    - Science & Technology
    - Howto & Style
  technical_keywords:
    - angular
    - react
    - vue
    - svelte
    - javascript
    - typescript
    - node
    - nestjs
    - python
    - java
    - docker
    - kubernetes
    - api
    - database
    - ai agent
    - rag
    - mcp
    - tutorial
    - course
    - coding
    - walkthrough
    - build
  blocked_keywords:
    - song
    - music
    - movie
    - trailer
    - prank
    - vlog
    - reaction
    - sports
    - comedy
    - gameplay
