name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for your idea! Check the [Roadmap](../../ROADMAP.md) first — it may already be planned.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point.
      placeholder: When I have a long transcript, I can't process it because...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true

  - type: dropdown
    id: type
    attributes:
      label: Feature type
      options:
        - New provider
        - New output mode
        - CLI command
        - Documentation improvement
        - Performance improvement
        - Other
    validations:
      required: true

  - type: checkboxes
    id: contribution
    attributes:
      label: Would you like to work on this?
      options:
        - label: Yes, I'd like to contribute this feature
